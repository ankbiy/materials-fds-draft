# Build JupyterLite (with xeus kernels) and deploy to GitHub Pages
# Enable in repo: Settings → Pages → Source = "GitHub Actions"

name: Deploy JupyterLite

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Micromamba
        uses: mamba-org/setup-micromamba@v1
        with:
          micromamba-version: "latest"
          environment-name: jupyterlite

      - name: Install JupyterLite-xeus
        run: |
          micromamba install -c conda-forge pip -y
          pip install jupyterlite-xeus

      - name: Build JupyterLite
        run: |
          jupyter lite build \
            --XeusAddon.environment_file=environment.yml \
            --XeusAddon.empack_config=empack_config.yaml

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: _output

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
