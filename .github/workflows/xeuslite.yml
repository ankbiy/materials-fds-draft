# Build JupyterLite (with xeus kernels) and deploy to GitHub Pages
# Enable in repo: Settings → Pages → Source = "GitHub Actions"

name: XeusLite

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Micromamba (for xeus env from environment.yml)
        run: |
          curl -Ls https://micro.mamba.pm/api/micromamba/linux-64/latest | tar -xvj bin/micromamba
          mkdir -p "$HOME/.local/bin" && mv bin/micromamba "$HOME/.local/bin/"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install JupyterLite build deps (core + xeus + jupyter_server)
        run: pip install "jupyterlite-core>=0.7" "jupyterlite-xeus>=4.3" jupyter_server

      - name: Build JupyterLite
        run: jupyter lite build \
            --XeusAddon.environment_file=environment.yml \
            --XeusAddon.empack_config=empack_config.yaml

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: _output

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
