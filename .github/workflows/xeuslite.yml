# Build JupyterLite (with xeus kernels) and deploy to GitHub Pages
# Enable in repo: Settings → Pages → Source = "GitHub Actions"

name: XeusLite

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Micromamba (build env with jupyterlite-core + jupyterlite-xeus)
        uses: mamba-org/setup-micromamba@v1
        with:
          micromamba-version: "latest"
          environment-file: .github/build-environment.yml
          cache-environment: true
          generate-run-shell: false

      - name: Build JupyterLite (kernel registered when build runs in activated env)
        run: micromamba run -n build-env jupyter lite build \
            --XeusAddon.environment_file=environment.yml \
            --XeusAddon.empack_config=empack_config.yaml \
            --output-dir dist

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
